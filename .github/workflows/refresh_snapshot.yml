name: Refresh Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Refresh pipeline outputs
        env:
          PUBLIC_SSL_VERIFY: "true"
        run: |
          python scripts/run_bronze.py
          python scripts/run_silver.py
          python scripts/run_features.py
          python scripts/run_gold.py
          python scripts/export_public_artifacts.py

      - name: Commit refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/site_data.js
          git diff --cached --quiet && exit 0
          git commit -m "Refresh published crypto market snapshot"
          git push
